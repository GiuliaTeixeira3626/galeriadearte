<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTech | Avisos</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        .main-content {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            font-family: "Poppins", sans-serif;
        }

        .page-title {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }

        .card-empresa {
            background-color: #1a321b;
            border: 1px solid #291f15;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            font-family: "Playfair Display", serif;
        }

        .card-titulo {
            color: #e3b062;
            font-size: 25px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .empresa-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .campo {
            display: flex;
            flex-direction: column;
        }

        .campo label {
            color: white;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .campo input,
        .campo textarea {
            background-color: #e6e7b3;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            color: #e6e7b3;
            font-family: "Poppins", sans-serif;
        }

        .campo input:focus,
        .campo textarea:focus {
            border-color: #000000;
        }

        .btn-enviar {
            width: 200px;
            align-self: center;
            background-color: #362a1c;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-enviar:hover {
            background-color: #362a1c;
        }

        .campo textarea {
            padding: 10px 14px;
            border: 1.5px solid #e6e7b3;
            border-radius: 8px;
            font-family: "Poppins", sans-serif;
            font-size: 13px;
            color: #000000;
            background-color: #e6e7b3;
            outline: none;
            transition: 0.2s;
            resize: vertical;
            min-height: 100px;
            width: 100%;
        }

        .campo textarea:focus {
            border-color: #6bad60;
            background-color: rgb(0, 0, 0);
        }

        .btn-enviar {
            background-color: #362a1c;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 28px;
            font-family: "Poppins", sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-top: 8px;
        }

        .btn-enviar:hover {
            background-color: #1d170f;
        }

        .btn-enviar:active {
            transform: scale(0.98);
        }

        .btn-enviar:disabled {
            background-color: #aaa;
            cursor: not-allowed;
            transform: none;
        }

        .feedback-msg {
            display: none;
            align-items: center;
            gap: 10px;
            border-radius: 10px;
            padding: 13px 18px;
            margin-top: 16px;
            font-size: 13px;
            font-weight: 600;
        }

        .feedback-msg.sucesso {
            background-color: rgba(107, 173, 96, 0.15);
            border: 1.5px solid rgba(107, 173, 96, 0.4);
            color: #28631d;
        }

        .feedback-msg.erro {
            background-color: rgba(185, 31, 31, 0.1);
            border: 1.5px solid rgba(185, 31, 31, 0.3);
            color: #b91f1f;
        }

        .campo-erro {
            border-color: #df6a6a !important;
            background-color: #fff8f8 !important;
        }

        .label-erro {
            font-size: 11px;
            color: #b91f1f;
            margin-top: 3px;
        }
    </style>
</head>

<body onload="validarSessao(), atualizarFeed()" style="background-color: #0b200c; font-family: Playfair Display, serif;" <div class="janela">


    <div class="header-left">

        <h1>LumenArt</h1>

        <div class="hello">
            <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
        </div>

        <div class="btn-nav-white">
            <a href="cards.html">
                <h3>Monitoramento das Salas</h3>
            </a>
        </div>


        <div class="btn-nav">
            <a href="./mural.html">
                <h3>Avalie sua experiência</h3>
            </a>
        </div>

        <div class="btn-logout" onclick="limparSessao()">
            <h3>Sair</h3>
        </div>

    </div>

    <div class="dash-right">


        <div class="main-content">

            <div class="card-empresa">
                <div class="card-titulo">
                    Envie sua mensagem
                </div>
                <div class="empresa-grid">

                    <div class="campo">
                        <label for="nome">Seu nome</label>
                        <input type="text" id="nome" placeholder="Ex: Seu nome" />
                        <span class="label-erro" id="erro-nome"></span>
                    </div>

                    <div class="campo">
                        <label for="email">E-mail para contato</label>
                        <input type="email" id="email" placeholder="seuemail@exemplo.com" />
                        <span class="label-erro" id="erro-email"></span>
                    </div>

                    <div class="campo" style="grid-column: span 2;">
                        <label for="mensagem">Mensagem</label>
                        <textarea id="mensagem" placeholder="Descreva sua dúvida ou problema em detalhes..."></textarea>
                        <span class="label-erro" id="erro-mensagem"></span>
                    </div>

                    <div style="grid-column: span 2;">
                        <button class="btn-enviar" id="btn-enviar" onclick="enviar()">Enviar Mensagem</button>
                    </div>

                    <div class="feedback-msg" id="feedback" style="grid-column: span 2;"></div>

                </div>
            </div>
        </div>
    </div>
    </div>
    <script>

        function limparErros() {
            ["nome", "email", "mensagem"].forEach(function (campo) {
                document.getElementById(campo).classList.remove("campo-erro");
                document.getElementById("erro-" + campo).textContent = "";
            });
        }

        function enviar() {
            limparErros();

            var nome = document.getElementById("nome").value.trim();
            var email = document.getElementById("email").value.trim();
            var mensagem = document.getElementById("mensagem").value.trim();
            var btn = document.getElementById("btn-enviar");
            var feedback = document.getElementById("feedback");

            var regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            var valido = true;

            if (!nome) {
                document.getElementById("nome").classList.add("campo-erro");
                document.getElementById("erro-nome").textContent = "Por favor, insira seu nome.";
                valido = false;
            }

            if (!email) {
                document.getElementById("email").classList.add("campo-erro");
                document.getElementById("erro-email").textContent = "Por favor, insira seu e-mail.";
                valido = false;
            } else if (!regexEmail.test(email)) {
                document.getElementById("email").classList.add("campo-erro");
                document.getElementById("erro-email").textContent = "Insira um e-mail válido.";
                valido = false;
            }

            if (!mensagem) {
                document.getElementById("mensagem").classList.add("campo-erro");
                document.getElementById("erro-mensagem").textContent = "Por favor, escreva sua mensagem.";
                valido = false;
            }

            if (!valido) return;

            btn.disabled = true;
            btn.textContent = "Enviando...";
            feedback.style.display = "none";

            fetch("/avisos/cadastrar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    nomeServer: nome,
                    emailServer: email,
                    mensagemServer: mensagem
                })
            })
                .then(function (response) {
                    if (response.ok) return response.text();
                    return response.text().then(function (msg) { throw new Error(msg); });
                })
                .then(function (msg) {
                    feedback.className = "feedback-msg sucesso";
                    feedback.textContent = msg;
                    feedback.style.display = "flex";
                    document.getElementById("nome").value = "";
                    document.getElementById("email").value = "";
                    document.getElementById("mensagem").value = "";
                })
                .catch(function (erro) {
                    feedback.className = "feedback-msg erro";
                    feedback.textContent = (erro.message || "Erro ao enviar. Tente novamente.");
                    feedback.style.display = "flex";
                })
                .finally(function () {
                    btn.disabled = false;
                    btn.textContent = "Enviar Mensagem";
                });
        }
    </script>

</body>

</html>
